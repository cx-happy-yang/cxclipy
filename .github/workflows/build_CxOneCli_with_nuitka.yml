name: Build CxOnCli with Nuitka for Ubuntu 20.04

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deploy:

    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04

    steps:
      - name: Install system build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install wget -y
          mkdir -p -m 755 /etc/apt/keyrings
          out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg
          cat $out |  tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt update
          apt-get install -y gcc g++ libpython3.8-dev python3.8-dev unzip curl git autoconf build-essential ca-certificates tzdata gh lsb-release
      - name: check glibc version
        run: ldd --version
      - name: Checkout cxclipy repository
        uses: actions/checkout@v4
      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Install dependencies
        run: |
          # Create and activate virtual environment
          pwd
          python -m venv myenv
          source myenv/bin/activate
          python -m pip install --upgrade pip --no-cache-dir
          pip install -r requirements.txt --no-cache-dir
          pip install nuitka
          pip list
          which nuitka
          pwd
        shell: bash
      - name: Build binary with Nuitka
        run: |
          CERT_PATH=$(/__w/cxclipy/cxclipy/myenv/bin/python -c "import certifi; print(certifi.where())") && /__w/cxclipy/cxclipy/myenv/bin/python -m nuitka --onefile --output-filename=CxOnCli --target-platform=linux_x86_64 --noinclude-default-mode=error --include-data-files=$CERT_PATH=certifi --define=certifi.where=$CERT_PATH CxOneCli.py
          git config --global --add safe.directory /__w/cxclipy/cxclipy
      - name: Verify binary executable
        run: |
          cd cxclipy/dist
          if [ -f "CxOnCli" ]; then
            echo "✅ Binary file generated successfully"
            chmod +x CxOnCli
            ./CxOnCli -c "import certifi; print('CA File:', certifi.where()); print('File exists:', __import__('os').path.exists(certifi.where()))" || echo "⚠️ Binary runs but certifi check failed (non-critical)"
          else
            echo "❌ Binary file not found!"
            exit 1
          fi
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
        run: >-
          gh release create ${{ github.ref_name }} /__w/cxclipy/cxclipy/dist/* --generate-notes --title "Version ${{ github.ref_name }}"
